# This is an advanced matrix exercise.
# It shows the simplest safe pattern when matrix values come from a GitHub secret.
# GitHub Actions creates the matrix before normal steps start,
# so we cannot read a secret directly inside strategy.matrix.
# The workaround is:
# 1. read the secret in one small job
# 2. pass it forward as a normal job output
# 3. build the matrix from that output
name: 83 EXERCISE CI Matrix Workflow From Secret

on:
  # Keep this exercise manual-only so it stays outside the core CI lab.
  workflow_dispatch:

jobs:
  prepare-matrix:
    # This first job only prepares the list of Python versions.
    # It does not run tests yet.
    runs-on: ubuntu-latest
    outputs:
      python_versions: ${{ steps.set-matrix.outputs.python_versions }}

    steps:
      - name: Read Python versions from secret
        # Expected secret format:
        # ["3.11","3.12"]
        #
        # We do not print the secret value.
        # We only pass it forward as a job output.
        id: set-matrix
        env:
          PYTHON_VERSIONS_JSON: ${{ secrets.PYTHON_VERSIONS_JSON }}
        run: |
          if [ -z "$PYTHON_VERSIONS_JSON" ]; then
            echo "Missing required secret: PYTHON_VERSIONS_JSON"
            echo 'Store a JSON array such as ["3.11","3.12"] in GitHub repository secrets.'
            exit 1
          fi

          # Save the JSON value as a normal output so the next job can use it.
          echo "python_versions=$PYTHON_VERSIONS_JSON" >> "$GITHUB_OUTPUT"

  run-tests:
    # Start only after the first job has prepared the version list.
    needs: prepare-matrix

    strategy:
      # Let all matrix jobs finish so students can compare every version.
      fail-fast: false
      matrix:
        # Turn the JSON text from the first job into real matrix values.
        python-version: ${{ fromJSON(needs.prepare-matrix.outputs.python_versions) }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository code onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        # This step repeats once for each Python version in the matrix.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show active Python version
        # This helps students confirm which matrix version is running now.
        run: python --version

      - name: Run tests
        # The test command stays the same. Only the Python version changes.
        run: python -m unittest discover -s tests -v
