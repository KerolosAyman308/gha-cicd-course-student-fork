# This is a challenge version of the first real CI workflow.
# It keeps the CI story, but adds visibility steps and a schedule example.
name: 81 EXERCISE CI Workflow - Visibility and Schedule

on:
  schedule:
    - cron: "05 11 * * 6"
  # Keep a manual trigger too, because schedules are not the best live-class trigger.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: List repository files
        run: ls -R

      - name: Show Python version
        run: python --version

      - name: Show runner time
        run: date
