# This is an advanced matrix exercise.
# It keeps the matrix list fixed in the workflow,
# but lets each matrix run read its Python version from a different secret.
# This is a smart shortcut when you already know which matrix jobs you want.
name: 84 EXERCISE CI Matrix Workflow Using Secret Lookup

on:
  # Keep this exercise manual-only so it stays outside the core CI lab.
  workflow_dispatch:

jobs:
  run-tests:
    # A matrix repeats the same job with different values.
    strategy:
      # Let both runs finish so students can compare them.
      fail-fast: false
      matrix:
        include:
          - label: "Python 3.11"
            version_secret: PYTHON_311
          - label: "Python 3.12"
            version_secret: PYTHON_312

    # Each matrix run gets a fresh runner.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Bring the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Check secret name for this matrix run
        # The matrix value is the secret name, not the Python version itself.
        # This step gives a clear error if the expected secret is missing.
        env:
          PYTHON_VERSION_FROM_SECRET: ${{ secrets[matrix.version_secret] }}
        run: |
          if [ -z "$PYTHON_VERSION_FROM_SECRET" ]; then
            echo "Missing required secret: ${{ matrix.version_secret }}"
            echo "Store a Python version such as 3.11 or 3.12 in that repository secret."
            exit 1
          fi

      - name: Set up ${{ matrix.label }}
        # GitHub Actions lets us choose which secret to read with bracket syntax.
        # Here, the matrix selects the secret name, and the secret holds the real version.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ secrets[matrix.version_secret] }}

      - name: Show active Python version
        # This helps students confirm which version the runner is using now.
        run: python --version

      - name: Run tests
        # The test command stays the same. Only the chosen secret changes.
        run: python -m unittest discover -s tests -v
