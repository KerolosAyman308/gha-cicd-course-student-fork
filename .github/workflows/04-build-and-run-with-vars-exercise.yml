# This challenge keeps the build-and-run story on one runner.
# The new GitHub Actions idea is reading normal configuration from repo settings.
name: 97 EXERCISE Build and Run With GitHub Variables

on:
  # Keep this challenge manual-only so it stays outside the core lab path.
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app-vars
  CONTAINER_NAME: tiny-health-container-vars
  BASE_IMAGE: ${{ vars.PYTHON_BASE_IMAGE }}
  APP_PORT: ${{ vars.APP_PORT }}

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check required GitHub variables
        # These values come from:
        # Settings -> Secrets and variables -> Actions -> Variables
        run: |
          if [ -z "${BASE_IMAGE}" ]; then
            echo "Missing GitHub Actions variable: PYTHON_BASE_IMAGE"
            exit 1
          fi
          if [ -z "${APP_PORT}" ]; then
            echo "Missing GitHub Actions variable: APP_PORT"
            exit 1
          fi

      - name: Show configured values
        run: |
          echo "Base image: ${BASE_IMAGE}"
          echo "App port: ${APP_PORT}"

      - name: Build Docker image with variable-driven base image
        run: |
          docker build \
            -f Dockerfile.arg-base \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            -t "${IMAGE_NAME}:from-vars" \
            .

      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:from-vars"

      - name: Wait for app to become ready
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health" > /dev/null; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Show health response
        run: curl --silent "http://127.0.0.1:${APP_PORT}/health"

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true
